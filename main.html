<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 1rem;
        }
        nav a {
            color: #fff;
            margin: 0 1rem;
            text-decoration: none;
        }
        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        section {
            margin: 2rem 0;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }

<body>
    <header>

    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>

    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>Welcome to my portfolio. This is clearly a work in progress.</p>
        </section>
        <section id="projects">
            <h2>Projects</h2>
            <p>My projects will eventually be here.</p>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <p>Get in touch with me here, when I add the functionality..</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 My Portfolio. All rights reserved.</p>
    </footer>

</html>
